runtime: nodejs22
service: mogo-backend
instance_class: F2
entrypoint: node dist/src/main.js

env_variables:
  NODE_ENV: "production"
  PORT: "8080"
  DATABASE_URL: "postgresql://tsuser:tsuser1234@localhost:5432/geobukschool_prod?host=/cloudsql/ts-back-nest-479305:asia-northeast3:geobuk-db&schema=mogo"
  AUTH_SECRET: "04ca023b39512e46d0c2cf4b48d5aac61d34302994c87ed4eff225dcf3b0a218739f3897051a057f9b846a69ea2927a587044164b7bae5e1306219d50b588cb1"
  HUB_API_URL: "https://ts-back-nest-479305.du.r.appspot.com"
  HUB_BASE_URL: "https://ts-back-nest-479305.du.r.appspot.com"
  SERVICE_ID: "mogo"
  # Hub이 발급한 mogo 전용 service JWT (1년 유효). 실제 값은 Secret Manager 또는 배포
  # 파이프라인에서 주입. 평문 커밋 금지 — 빈 문자열일 때 HubInternalService가 명시적
  # 에러를 던지도록 구현되어 있음.
  HUB_SERVICE_TOKEN: ""

beta_settings:
  cloud_sql_instances: "ts-back-nest-479305:asia-northeast3:geobuk-db"

automatic_scaling:
  min_instances: 0
  max_instances: 3
  target_cpu_utilization: 0.65
  target_throughput_utilization: 0.65

handlers:
  - url: /.*
    script: auto
    secure: always
